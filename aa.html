<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Save</title>

<style>

body{
    background:#111827;
    color:white;
    font-family:Arial;
    padding:20px;
}

.box{
    max-width:900px;
    margin:auto;
}

input,button{
    padding:12px;
    border:none;
    border-radius:10px;
    margin:5px;
}

button{
    cursor:pointer;
    font-weight:bold;
}

.upload{
    background:#22c55e;
    color:white;
}

.clear{
    background:#ef4444;
    color:white;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
    margin-top:20px;
}

.card{
    background:#1f2937;
    padding:10px;
    border-radius:12px;
}

.card img{
    width:100%;
    border-radius:10px;
}

</style>
</head>
<body>

<div class="box">

<h1>Realtime Image Save</h1>

<input type="file" id="file">

<button class="upload" onclick="uploadImg()">
Upload
</button>

<button class="clear" onclick="clearAll()">
Clear All
</button>

<div class="gallery" id="gallery"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
push,
onValue,
remove
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

apiKey: "AIzaSyBbnU8DkthpYQMHOLLyj6M0cc05qXfjMcw",

authDomain: "ramadan-2385b.firebaseapp.com",

databaseURL: "https://ramadan-2385b-default-rtdb.firebaseio.com",

projectId: "ramadan-2385b",

storageBucket: "ramadan-2385b.appspot.com",

messagingSenderId: "882828936310",

appId: "1:882828936310:web:7f97b921031fe130fe4b57"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

const gallery = document.getElementById("gallery");

window.uploadImg = function(){

    const file =
    document.getElementById("file").files[0];

    if(!file){
        alert("Select Image");
        return;
    }

    const reader = new FileReader();

    reader.onload = async function(e){

        const base64 = e.target.result;

        await push(ref(db,"images"),{

            img: base64,
            time: Date.now()

        });

        alert("Uploaded");

    };

    reader.readAsDataURL(file);

};

onValue(ref(db,"images"),(snapshot)=>{

    gallery.innerHTML = "";

    const data = snapshot.val();

    if(!data){
        gallery.innerHTML = "<h2>No Images</h2>";
        return;
    }

    Object.values(data).reverse().forEach(item=>{

        gallery.innerHTML += `

        <div class="card">
            <img src="${item.img}">
        </div>

        `;

    });

});

window.clearAll = async function(){

    if(confirm("Delete All Images?")){

        await remove(ref(db,"images"));

        alert("Deleted");

    }

};

</script>

</body>
</html>
